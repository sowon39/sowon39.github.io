  <style>
    :root {
      --panel: rgba(255, 255, 255, 0.78);
      --text: #2c2324;
      --muted: #8b7478;
      --brand: #d88b95;
      --brand-dark: #a95c68;
      --line: rgba(95, 60, 67, 0.14);
      --shadow: 0 24px 80px rgba(77, 40, 48, 0.18);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-serif, Georgia, "Times New Roman", "Apple SD Gothic Neo", "Noto Serif KR", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 212, 219, 0.8), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(255, 236, 206, 0.85), transparent 26%),
        linear-gradient(135deg, #fffaf9 0%, #f8eced 48%, #fff5ef 100%);
      overflow: hidden;
    }

    button { font: inherit; cursor: pointer; }

    .app {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      height: 100vh;
      padding: 22px;
      gap: 22px;
    }

    .sidebar, .viewer {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand {
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }

    .date-grid {
      display: grid;
      gap: 12px;
    }

    .count-card.d-day-card {
      position: relative;
      overflow: hidden;
    }

    .count-card.d-day-card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      top: -80px;
      background: radial-gradient(circle, rgba(255,255,255,.42), transparent 68%);
      pointer-events: none;
    }

    .dday-headline {
      margin: 0 0 14px;
      font-family: ui-serif, Georgia, "Times New Roman", "Apple SD Gothic Neo", "Noto Serif KR", serif;
      font-size: 24px;
      line-height: 1.08;
      letter-spacing: -.05em;
    }

    .dday-sub {
      display: block;
      margin-top: 6px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      opacity: .78;
    }

    .count-card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.62);
      padding: 16px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }


    .dday-link {
      display: block;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .dday-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 46px rgba(198, 104, 117, .28);
    }

    .dday-link:active {
      transform: translateY(0) scale(.995);
    }

    .count-card.highlight {
      background: linear-gradient(135deg, rgba(216,139,149,.96), rgba(245,190,172,.92));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 16px 38px rgba(198, 104, 117, .22);
    }

    .count-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      opacity: .84;
      margin-bottom: 12px;
    }

    .count-label small {
      font-size: 11px;
      font-weight: 700;
      opacity: .72;
    }


    .dday-summary {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      margin: 0 0 14px;
    }

    .dday-kicker {
      display: block;
      margin-bottom: 4px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .72;
    }

    .calendar-dday {
      display: block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(34px, 5vw, 46px);
      line-height: .94;
      letter-spacing: -.08em;
      color: #fff;
      text-shadow: 0 10px 28px rgba(90,44,52,.18);
    }


    .hall-link {
      display: block;
      margin-top: 6px;
      font-style: normal;
      font-size: 11px;
      font-weight: 900;
      opacity: .9;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .dday-place {
      display: block;
      margin-bottom: 2px;
      text-align: right;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.45;
      opacity: .82;
    }

    .countdown-title {
      position: relative;
      z-index: 1;
      margin: 2px 0 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .02em;
      opacity: .76;
    }

    .exact-countdown {
      position: relative;
      z-index: 1;
    }

    .flip-row {
      display: grid;
      grid-template-columns: 1.35fr .88fr .88fr .88fr;
      gap: 7px;
      align-items: stretch;
    }

    .flip-unit { min-width: 0; }

    .flip-number {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 54px;
      border-radius: 16px;
      background: rgba(44, 35, 36, .88);
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.05em;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 8px 18px rgba(45, 27, 31, .16);
      transform-origin: center;
      transition: transform .2s ease;
    }

    .flip-number::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,.16);
      z-index: 1;
    }

    .flip-number.tick { animation: flipTick .38s ease; }

    .flip-caption {
      display: block;
      margin-top: 7px;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      opacity: .76;
    }

    .list {
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 12px;
      scrollbar-width: thin;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    .photo-item {
      scroll-margin: 14px;
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: rgba(255,255,255,.54);
      border-radius: 22px;
      padding: 10px;
      color: inherit;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .photo-item:hover { transform: translateY(-2px); background: rgba(255,255,255,.88); }
    .photo-item.active { border-color: rgba(216,139,149,.9); background: #fff; }

    .thumb {
      width: 86px;
      height: 64px;
      object-fit: cover;
      border-radius: 16px;
      background: #f4e2e4;
    }

    .item-title {
      display: block;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 800;
      font-size: 14px;
    }

    .viewer {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .current-title { min-width: 0; }

    .current-title strong {
      display: block;
      font-size: 18px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .current-title span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 9px;
      align-items: flex-end;
      justify-content: center;
    }

    .action-group {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .primary-actions {
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.42);
    }

    .utility-actions {
      opacity: .92;
    }

    .icon-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.76);
      min-width: 42px;
      height: 40px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 800;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
      white-space: nowrap;
    }

    .icon-btn.compact {
      width: 40px;
      min-width: 40px;
      padding: 0;
    }

    .icon-btn.theme-toggle {
      width: auto;
      min-width: 86px;
      padding: 0 13px;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      background: #fff;
      box-shadow: 0 8px 18px rgba(77, 40, 48, .08);
    }

    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(255,255,255,.35);
      touch-action: pan-y;
    }

    .main-img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(60,35,40,.22);
      user-select: none;
      -webkit-user-drag: none;
      cursor: zoom-in;
      touch-action: pan-y;
      transition: opacity .32s ease, transform .42s ease, filter .42s ease;
    }

    .frame.is-loading::after {
      content: "";
      position: absolute;
      width: 34px;
      height: 34px;
      border: 3px solid rgba(44,35,36,.16);
      border-top-color: var(--brand-dark);
      border-radius: 999px;
      animation: spin .75s linear infinite;
      z-index: 2;
    }

    .main-img.changing {
      opacity: 0;
      transform: translateX(var(--slide-from, 0px)) scale(.985);
    }

    .main-img.slide-in {
      animation: photoSlideIn .58s cubic-bezier(.22, .72, .22, 1) both;
    }

    @keyframes photoSlideIn {
      from {
        opacity: 0;
        transform: translateX(var(--slide-from, 18px)) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    .main-img.zoomed { transform: scale(1.55); cursor: zoom-out; }
    .main-img.fit-cover { width: 100%; height: 100%; object-fit: cover; }
    .main-img.bw { filter: grayscale(1) contrast(1.05); }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      box-shadow: 0 10px 30px rgba(60,35,40,.14);
      color: var(--text);
      font-size: 28px;
      z-index: 3;
    }

    .nav-arrow:hover { background: #fff; }
    .prev { left: 18px; }
    .next { right: 18px; }

    .caption {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    .progress-wrap {
      flex: 1;
      height: 7px;
      background: rgba(80,50,55,.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), #f0b9a8);
      border-radius: 999px;
      transition: width .25s ease;
    }

    .progress-wrap {
      cursor: pointer;
      position: relative;
    }

    .progress-wrap::after {
      content: "";
      position: absolute;
      inset: -8px 0;
    }

    .dots {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      max-width: 180px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 2px;
      scroll-behavior: smooth;
      scrollbar-width: none;
      overscroll-behavior: contain;
    }

    .dots::-webkit-scrollbar { display: none; }

    .dot {
      width: 7px;
      height: 7px;
      border: 0;
      border-radius: 999px;
      padding: 0;
      background: rgba(139,116,120,.32);
      transition: width .2s ease, background .2s ease, transform .2s ease;
      flex: 0 0 auto;
    }

    .dot.active {
      width: 20px;
      background: var(--brand);
      transform: translateY(-1px);
    }

    .grid-modal {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 35;
      background: rgba(22,16,18,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 22px;
    }

    .grid-modal.open {
      display: block;
      animation: overlayFade .22s ease both;
    }

    .grid-panel {
      width: min(980px, 100%);
      max-height: calc(100vh - 44px);
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 28px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 28px 80px rgba(0,0,0,.28);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .grid-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 900;
    }

    .grid-close {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      width: 38px;
      height: 38px;
      color: var(--text);
    }

    .grid-list {
      overflow: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 12px;
    }

    .grid-tile {
      border: 1px solid transparent;
      background: rgba(255,255,255,.74);
      border-radius: 18px;
      padding: 7px;
      color: inherit;
      text-align: left;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .grid-tile:hover {
      transform: translateY(-2px);
      background: #fff;
    }

    .grid-tile.active {
      border-color: rgba(216,139,149,.95);
      background: #fff;
    }

    .grid-tile img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 13px;
      background: #f4e2e4;
    }

    .grid-tile span {
      display: block;
      margin-top: 7px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    body.intro-ready .sidebar,
    body.intro-ready .viewer {
      animation: introUp .58s cubic-bezier(.22,.72,.22,1) both;
    }

    body.intro-ready .viewer {
      animation-delay: .08s;
    }

    @keyframes introUp {
      from {
        opacity: 0;
        transform: translateY(14px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes overlayFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }


    /* 🌸 자동 슬라이드 몰입 모드: 웨딩톤 배경 + 사진 중심 */
    body.immersive {
      background:
        radial-gradient(circle at 20% 8%, rgba(255, 199, 211, .62), transparent 30%),
        radial-gradient(circle at 82% 14%, rgba(255, 231, 201, .58), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(216,139,149,.22), transparent 36%),
        linear-gradient(135deg, #fff7f8 0%, #fbe8ec 52%, #fff0eb 100%);
      overflow: hidden;
    }

    body.immersive .app {
      grid-template-columns: 1fr;
      padding: 0;
      gap: 0;
      height: 100vh;
    }

    body.immersive .sidebar,
    body.immersive .topbar,
    body.immersive .caption,
    body.immersive .nav-arrow {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-10px);
      transition: opacity .48s ease, transform .48s ease;
    }

    body.immersive .sidebar {
      display: none;
    }

    body.immersive .viewer {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
    }

    body.immersive .stage {
      min-height: 100vh;
      padding: clamp(14px, 3.5vw, 42px);
    }

    body.immersive .frame {
      border-radius: 0;
      background: transparent;
      overflow: visible;
    }

    body.immersive .frame.is-loading::after {
      border-color: rgba(169,92,104,.18);
      border-top-color: rgba(169,92,104,.72);
    }

    body.immersive .main-img {
      border-radius: 20px;
      box-shadow:
        0 34px 110px rgba(169,92,104,.22),
        0 12px 34px rgba(77,40,48,.12);
      cursor: default;
    }

    body.immersive .main-img.changing {
      opacity: 0;
      transform: scale(1.025);
    }

    body.immersive .main-img.slide-in {
      animation: weddingFadeIn 1.18s ease both;
    }

    body.immersive .toast {
      background: rgba(44,35,36,.78);
    }

    body.immersive::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.22), transparent 18%, transparent 82%, rgba(255,255,255,.20)),
        radial-gradient(circle at 50% 50%, transparent 48%, rgba(255,220,225,.18));
      z-index: 0;
    }

    body.immersive .viewer {
      position: relative;
      z-index: 1;

    /* 크게 보기 좌우 스와이프 힌트 */
    .modal::before,
    .modal::after {
      content: "";
      position: absolute;
      top: 50%;
      z-index: 2;
      width: 26px;
      height: 26px;
      border-top: 2px solid rgba(255,255,255,.68);
      border-right: 2px solid rgba(255,255,255,.68);
      opacity: 0;
      pointer-events: none;
      transition: opacity .42s ease, transform .42s ease;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.22));

    .modal::before {
      left: clamp(18px, 4vw, 46px);
      transform: translateY(-50%) translateX(8px) rotate(-135deg);
    }

    .modal::after {
      right: clamp(18px, 4vw, 46px);
      transform: translateY(-50%) translateX(-8px) rotate(45deg);
    }

    .modal.hint::before {
      opacity: .9;
      transform: translateY(-50%) translateX(0) rotate(-135deg);
      animation: hintLeft 1.6s ease both;
    }

    .modal.hint::after {
      opacity: .9;
      transform: translateY(-50%) translateX(0) rotate(45deg);
      animation: hintRight 1.6s ease both;
    }

    @keyframes hintLeft {
      0%, 100% { opacity: 0; transform: translateY(-50%) translateX(8px) rotate(-135deg); }
      18%, 72% { opacity: .82; transform: translateY(-50%) translateX(0) rotate(-135deg); }
    }

    @keyframes hintRight {
      0%, 100% { opacity: 0; transform: translateY(-50%) translateX(-8px) rotate(45deg); }

    </div>
  </div>
  <div id="pullRefresh" class="pull-refresh" aria-hidden="true"><span></span><b>새로고침</b></div>
  <div id="toast" class="toast"></div>
  <audio id="bgm" src="wedding/ae.mp3" loop preload="none"></audio>

  <script>
    const weddingDate = "2026-08-30T14:30:00";
    const MUSIC_START_TIME = 76;

    const photos = Array.from({ length: 22 }, (_, index) => {
      const number = String(index + 1).padStart(2, "0");
      return {
        file: `wedding/wedding${number}.jpg`,
        thumb: `wedding/thumb/wedding${number}.jpg`,
        title: `Photo ${number}`
      };
    });

    const els = {
      list: document.getElementById("photoList"),
      mainImg: document.getElementById("mainImg"),
      frame: document.getElementById("frame"),
      currentName: document.getElementById("currentName"),
      currentMeta: document.getElementById("currentMeta"),
      counter: document.getElementById("counter"),
      progress: document.getElementById("progress"),
      progressWrap: document.getElementById("progressWrap"),
      dots: document.getElementById("dots"),
      favoriteBtn: document.getElementById("favoriteBtn"),
      filterBtn: document.getElementById("filterBtn"),
      gridBtn: document.getElementById("gridBtn"),
      slideshowBtn: document.getElementById("slideshowBtn"),
      musicBtn: document.getElementById("musicBtn"),
      downloadBtn: document.getElementById("downloadBtn"),
      bwBtn: document.getElementById("bwBtn"),
      shareBtn: document.getElementById("shareBtn"),
      homeBtn: document.getElementById("homeBtn"),
      fullBtn: document.getElementById("fullBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      modal: document.getElementById("modal"),
      modalImg: document.getElementById("modalImg"),
      gridModal: document.getElementById("gridModal"),
      gridList: document.getElementById("gridList"),
      gridCloseBtn: document.getElementById("gridCloseBtn"),
      installModal: document.getElementById("installModal"),
      installCloseBtn: document.getElementById("installCloseBtn"),
      installGuide: document.getElementById("installGuide"),
      toast: document.getElementById("toast"),
      pullRefresh: document.getElementById("pullRefresh"),
      bgm: document.getElementById("bgm"),
      calendarDday: document.getElementById("calendarDday"),
      ddayExactDays: document.getElementById("ddayExactDays"),
      ddayHours: document.getElementById("ddayHours"),
      ddayMinutes: document.getElementById("ddayMinutes"),
      ddaySeconds: document.getElementById("ddaySeconds")
    };

    let state = {
      index: 0,
      favorites: JSON.parse(localStorage.getItem("weddingFavorites") || "[]"),
      filterFavorites: false,
      slideshow: null,
      musicOn: false,
      bw: localStorage.getItem("weddingBwMode") === "true",
      lastClock: {},
      gestureStartX: 0,
      gestureStartY: 0,
      gestureStartTime: 0,
      pointerActive: false,
      activePointerId: null,
      pullStartY: 0,
      pullActive: false,
      pullDistance: 0,
      imageCache: new Map(),
      thumbCache: new Map(),
      slideDirection: 1,
      longPressTimer: null,
      longPressTriggered: false,
      immersive: false,
      modalPointerActive: false,
      modalStartX: 0,
      modalStartY: 0,
      modalStartTime: 0,
      modalCurrentX: 0,
      modalCurrentY: 0,
      modalLastX: 0,
      modalLastTime: 0,
      modalVelocityX: 0,
      modalHintTimer: null,
      lockedScrollY: 0,
      lastEffectIndex: -1,
      deferredInstallPrompt: null,
      modalScale: 1,
      modalTranslateX: 0,
      modalTranslateY: 0,
      modalPanStartX: 0,
      modalPanStartY: 0,
      modalStartTranslateX: 0,
      modalStartTranslateY: 0,
      modalPinching: false,
      modalPinchStartDistance: 0,
      modalPinchStartScale: 1
    };


    function hideIntro() {
      const intro = document.getElementById("intro");
      if (!intro) return;

      window.setTimeout(() => {
        intro.classList.add("hide");
      }, 920);

      window.setTimeout(() => {
        intro.remove();
      }, 1400);
    }

    function pad(value, length = 2) {
      return String(value).padStart(length, "0");
    }

    function setFlipValue(el, value, key) {
      if (state.lastClock[key] === value) return;
      state.lastClock[key] = value;
      el.textContent = value;
      el.classList.remove("tick");
      void el.offsetWidth;
      el.classList.add("tick");
    }

    function getCountdown() {
      const now = new Date();
      const target = new Date(weddingDate);

      // D-day 대표 표기는 날짜 기준입니다. 시간 때문에 하루 적게 보이지 않게 합니다.
      const todayDateOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const targetDateOnly = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      const calendarDays = Math.max(Math.ceil((targetDateOnly - todayDateOnly) / 86400000), 0);

      // 실시간 카운트다운은 실제 예식 시간(2026-08-30 14:30) 기준입니다.
      const timeDiff = Math.max(target - now, 0);

      return {
        calendarDays,
        exactDays: Math.floor(timeDiff / 86400000),
        hours: Math.floor((timeDiff % 86400000) / 3600000),
        minutes: Math.floor((timeDiff % 3600000) / 60000),
        seconds: Math.floor((timeDiff % 60000) / 1000)
      };
    }

    function renderDateCounts() {
      const countdown = getCountdown();
      els.calendarDday.textContent = `D-${countdown.calendarDays.toLocaleString("ko-KR")}`;
      setFlipValue(els.ddayExactDays, pad(countdown.exactDays, 3), "exactDays");
      setFlipValue(els.ddayHours, pad(countdown.hours), "hours");
      setFlipValue(els.ddayMinutes, pad(countdown.minutes), "minutes");
      setFlipValue(els.ddaySeconds, pad(countdown.seconds), "seconds");
    }

    function filteredPhotos() {
      let list = photos.map((photo, originalIndex) => ({ ...photo, originalIndex }));

      if (state.filterFavorites) {
        list = list.filter(photo => state.favorites.includes(photo.file));
      }

      return list;
    }

    function saveFavorites() {
      localStorage.setItem("weddingFavorites", JSON.stringify(state.favorites));
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      setTimeout(() => els.toast.classList.remove("show"), 1400);
    }

    function applyBwMode() {
      document.body.classList.toggle("bw-mode", state.bw);
      els.bwBtn.textContent = state.bw ? "◑ 컬러" : "◐ 흑백";
      els.bwBtn.title = state.bw ? "컬러로 보기" : "흑백 감성 보기";
      localStorage.setItem("weddingBwMode", String(state.bw));
    }

    function renderList() {
      const list = filteredPhotos();
      els.list.innerHTML = "";

      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "photo-item";
        empty.style.display = "block";
        empty.style.textAlign = "center";
        empty.style.padding = "18px";
        empty.textContent = "좋아요한 사진이 없습니다.";
        els.list.appendChild(empty);
        return;
      }

      list.forEach((photo) => {
        const active = photo.originalIndex === state.index;
        const liked = state.favorites.includes(photo.file);
        const button = document.createElement("button");
        button.className = `photo-item ${active ? "active" : ""}`;
        button.type = "button";
        button.dataset.index = String(photo.originalIndex);
        button.innerHTML = `
          <img class="thumb" src="${photo.thumb}" alt="${photo.title}" loading="lazy" decoding="async" onerror="this.onerror=null; this.src='${photo.file}';">
          <span><span class="item-title">${liked ? "♥ " : ""}${photo.title}</span></span>
        `;
        button.addEventListener("click", () => {
          state.slideDirection = photo.originalIndex >= state.index ? 1 : -1;
          selectPhoto(photo.originalIndex);
        });
        els.list.appendChild(button);
      });
    }

    function syncActiveThumbnail() {
      requestAnimationFrame(() => {
        const activeItem = els.list.querySelector(`.photo-item[data-index="${state.index}"]`);
        if (!activeItem) return;

        // 모바일에서 scrollIntoView를 쓰면 페이지가 썸네일 섹션 쪽으로 튀는 문제가 있어
        // 썸네일 리스트 내부의 가로 스크롤만 직접 이동시킵니다.
        const listRect = els.list.getBoundingClientRect();
        const itemRect = activeItem.getBoundingClientRect();

        const currentScroll = els.list.scrollLeft;
        const itemCenter = itemRect.left - listRect.left + currentScroll + itemRect.width / 2;
        const targetScroll = itemCenter - els.list.clientWidth / 2;

        els.list.scrollTo({
          left: Math.max(0, targetScroll),
          behavior: "smooth"
        });
      });
    }

    function renderDots() {
      const list = filteredPhotos();
      els.dots.innerHTML = "";

      list.forEach((photo, visibleIndex) => {
        const dot = document.createElement("button");
        dot.className = `dot ${photo.originalIndex === state.index ? "active" : ""}`;
        dot.type = "button";
        dot.title = `${visibleIndex + 1} / ${list.length}`;
        dot.addEventListener("click", () => {
          state.slideDirection = photo.originalIndex >= state.index ? 1 : -1;
          selectPhoto(photo.originalIndex);
        });
        els.dots.appendChild(dot);
      });

      const activeDot = els.dots.querySelector(".dot.active");
      if (activeDot) {
        const dotsRect = els.dots.getBoundingClientRect();
        const dotRect = activeDot.getBoundingClientRect();
        const currentScroll = els.dots.scrollLeft;
        const dotCenter = dotRect.left - dotsRect.left + currentScroll + dotRect.width / 2;
        els.dots.scrollTo({
          left: Math.max(0, dotCenter - els.dots.clientWidth / 2),
          behavior: "smooth"
        });
      }
    }


    function clearPhotoEffects() {
      els.mainImg.classList.remove(
        "effect-zoom-in",
        "effect-zoom-out",
        "effect-pan-left",
        "effect-pan-right",
        "effect-float",
        "movie-zoom-in",
        "movie-zoom-out",
        "movie-pan-left",
        "movie-pan-right",
        "movie-float-up",
        "movie-soft-tilt",
        "cine-drift-right",
        "cine-drift-left",
        "cine-rise",
        "cine-push-in",
        "cine-pull-back",
        "cine-tilt",
        "cine-orbit"
      );
    }

    function applyRandomPhotoEffect() {
      clearPhotoEffects();

      if (!document.body.classList.contains("immersive")) return;

      const cinematicEffects = [
        "cine-drift-right",
        "cine-drift-left",
        "cine-rise",
        "cine-push-in",
        "cine-pull-back",
        "cine-tilt",
        "cine-orbit"
      ];

      let nextEffectIndex = Math.floor(Math.random() * cinematicEffects.length);
      if (nextEffectIndex === state.lastEffectIndex) {
        nextEffectIndex = (nextEffectIndex + 1) % cinematicEffects.length;
      }

      state.lastEffectIndex = nextEffectIndex;
      els.mainImg.classList.add(cinematicEffects[nextEffectIndex]);
    }

    function selectPhoto(index) {
      state.index = (index + photos.length) % photos.length;
      const photo = photos[state.index];

      els.frame.classList.add("is-loading");
      els.mainImg.classList.add("changing");

      const cached = state.imageCache.get(photo.file);
      const nextSrc = cached && cached.complete ? cached.src : photo.file;

      const showImage = () => {
        const direction = state.slideDirection >= 0 ? 1 : -1;
        if (document.body.classList.contains("immersive")) {
          els.mainImg.style.setProperty("--slide-from", "0px");
        } else {
          els.mainImg.style.setProperty("--slide-from", `${direction * 22}px`);
        }
        els.mainImg.classList.remove("slide-in");

        els.mainImg.src = nextSrc;
        els.mainImg.alt = photo.title;
        els.currentName.textContent = photo.title;
        els.currentMeta.textContent = `${state.index + 1} / ${photos.length}`;
        els.counter.textContent = `${state.index + 1} / ${photos.length}`;
        els.progress.style.width = `${((state.index + 1) / photos.length) * 100}%`;
        updateFavoriteButton();
        renderList();
        renderDots();
        syncActiveThumbnail();
        preloadAround(state.index);
        if (els.modal.classList.contains("open")) {
          updateModalImage();
        }

        requestAnimationFrame(() => {
          els.mainImg.classList.remove("changing");
          clearPhotoEffects();
          applyRandomPhotoEffect();
          void els.mainImg.offsetWidth;
          els.mainImg.classList.add("slide-in");
          els.frame.classList.remove("is-loading");
        });
      };

      if (cached && cached.complete) {
        showImage();
      } else {
        const img = new Image();
        img.decoding = "async";
        img.onload = showImage;
        img.onerror = showImage;
        img.src = photo.file;
        state.imageCache.set(photo.file, img);
      }
    }

    function updateFavoriteButton() {
      const photo = photos[state.index];
      const liked = state.favorites.includes(photo.file);
      els.favoriteBtn.textContent = liked ? "♥" : "♡";
      els.favoriteBtn.style.background = liked ? "#2c2324" : "rgba(255,255,255,.76)";
      els.favoriteBtn.style.color = liked ? "#fff" : "var(--text)";
    }

    function updateFilterButton() {
      els.filterBtn.textContent = state.filterFavorites ? "전체보기" : "♥ 모아보기";
      els.filterBtn.style.background = state.filterFavorites ? "#2c2324" : "rgba(255,255,255,.76)";
      els.filterBtn.style.color = state.filterFavorites ? "#fff" : "var(--text)";
    }

    function toggleFilterFavorites() {
      state.filterFavorites = !state.filterFavorites;
      updateFilterButton();

      const list = filteredPhotos();
      renderList();
      renderDots();

      if (state.filterFavorites) {
        if (list.length) {
          selectPhoto(list[0].originalIndex);
        } else {
          toast("좋아요한 사진이 없습니다");
        }
      } else {
        selectPhoto(state.index);
      }
    }

    function move(step) {
      state.slideDirection = step >= 0 ? 1 : -1;
      const list = filteredPhotos();
      if (!list.length) return;

      const currentVisibleIndex = list.findIndex(photo => photo.originalIndex === state.index);
      const safeIndex = currentVisibleIndex === -1 ? 0 : currentVisibleIndex;
      const next = list[(safeIndex + step + list.length) % list.length];

      selectPhoto(next.originalIndex);
    }

    function toggleFavorite() {
      const file = photos[state.index].file;
      if (state.favorites.includes(file)) {
        state.favorites = state.favorites.filter(item => item !== file);
        toast("좋아요 해제");
      } else {
        state.favorites.push(file);
        toast("좋아요 추가");
      }
      saveFavorites();
      updateFavoriteButton();
      updateFilterButton();

      const list = filteredPhotos();
      if (state.filterFavorites && !list.length) {
        renderList();
        toast("좋아요한 사진이 없습니다");
        return;
      }

      if (state.filterFavorites && !state.favorites.includes(file)) {
        selectPhoto(list[0].originalIndex);
      } else {
        renderList();
        renderDots();
        if (els.gridModal.classList.contains("open")) renderGrid();
      }
    }

    async function playMusicFromHighlight(showMessage = true) {
      try {
        if (!state.musicOn) {
          els.bgm.currentTime = MUSIC_START_TIME;
        }
        await els.bgm.play();
        state.musicOn = true;
        els.musicBtn.textContent = "Ⅱ 정지";
        if (showMessage) toast("음악 재생");
      } catch (error) {
        if (showMessage) toast("음악 파일을 확인해 주세요");
      }
    }

    function pauseMusic(showMessage = true) {
      els.bgm.pause();
      state.musicOn = false;
      els.musicBtn.textContent = "♪ 재생";
      if (showMessage) toast("음악 일시정지");
    }

    function enableFirstTouchMusic() {
      const playOnce = async () => {
        await playMusicFromHighlight(false);
      };
      document.addEventListener("click", playOnce, { once: true });
      document.addEventListener("touchstart", playOnce, { once: true });
      document.addEventListener("keydown", playOnce, { once: true });
    }

    async function toggleMusic() {
      if (state.musicOn) {
        pauseMusic(true);
      } else {
        await playMusicFromHighlight(true);
      }
    }

    function downloadCurrentPhoto() {
      const photo = photos[state.index];
      const link = document.createElement("a");
      link.href = photo.file;
      link.download = photo.file.split("/").pop() || "wedding-photo.jpg";
      document.body.appendChild(link);
      link.click();
      link.remove();
      toast("사진 저장 시작");
    }

    function toggleBwMode() {
      state.bw = !state.bw;
      applyBwMode();
    }


    function setupPwaManifest() {
      const manifest = {
        name: "DK&HL Wedding Book",
        short_name: "Wedding Book",
        description: "2026.08.30 DK&HL Wedding Photos",
        start_url: "/index01.html",
        scope: "/",
        display: "standalone",
        background_color: "#fff7f8",
        theme_color: "#fbe7ec",
        icons: [
          {
            src: "wedding/app-icon-192.png",
            sizes: "192x192",
            type: "image/png",
            purpose: "any maskable"
          },
          {
            src: "wedding/app-icon-512.png",
            sizes: "512x512",
            type: "image/png",
            purpose: "any maskable"
          }
        ]
      };

      const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      const manifestUrl = URL.createObjectURL(blob);
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = manifestUrl;
      document.head.appendChild(link);
    }

    function setupInstallPrompt() {
      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        state.deferredInstallPrompt = event;
      });

      window.addEventListener("appinstalled", () => {
        state.deferredInstallPrompt = null;
        toast("홈화면에 추가됐어요");
      });
    }

    function isIos() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    async function addToHomeScreen() {
      if (isStandalone()) {
        toast("이미 홈화면 앱으로 실행 중입니다");
        return;
      }

      if (state.deferredInstallPrompt) {
        const promptEvent = state.deferredInstallPrompt;
        state.deferredInstallPrompt = null;
        promptEvent.prompt();
        await promptEvent.userChoice;
        return;
      }

      if (isIos()) {
        els.installGuide.textContent = "iPhone에서는 하단 공유 버튼을 누른 뒤 ‘홈 화면에 추가’를 선택해 주세요.";
      } else {
        els.installGuide.textContent = "브라우저 메뉴에서 ‘앱 설치’ 또는 ‘홈 화면에 추가’를 선택해 주세요.";
      }

      els.installModal.classList.add("open");
    }

    function closeInstallGuide() {
      els.installModal.classList.remove("open");
    }

    async function sharePage() {
      const url = window.location.href;
      const title = "DK&HL Wedding Book";
      const text = "2026.08.30 DK&HL Wedding Photos";

      if (navigator.share) {
        try {
          await navigator.share({ title, text, url });
          return;
        } catch (error) {}
      }

      try {
        await navigator.clipboard.writeText(url);
        toast("링크 복사 완료");
      } catch (error) {
        const input = document.createElement("input");
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        toast("링크 복사 완료");
      }
    }


    function enterImmersiveMode() {
      state.immersive = true;
      document.body.classList.add("immersive");
      closeGrid();
      closeModal();
    }

    function exitImmersiveMode() {
      state.immersive = false;
      document.body.classList.remove("immersive");
      clearPhotoEffects();
    }

    function toggleSlideshow() {
      if (state.slideshow) {
        clearInterval(state.slideshow);
        state.slideshow = null;

        exitImmersiveMode();

        els.slideshowBtn.textContent = "🎬 시네마틱";
        toast("자동 재생 정지");
      } else {
        enterImmersiveMode();

        // 음악은 자동 슬라이드와 분리합니다.
        // 이미 재생 중인 음악은 그대로 이어지고, 꺼져 있으면 그대로 꺼진 상태를 유지합니다.
        state.slideshow = setInterval(() => move(1), 4500);
        els.slideshowBtn.textContent = "Ⅱ 정지";
        toast("자동 재생 시작");
      }
    }



    function resetModalZoom() {
      state.modalScale = 1;
      state.modalTranslateX = 0;
      state.modalTranslateY = 0;
      state.modalPanStartX = 0;
      state.modalPanStartY = 0;
      state.modalStartTranslateX = 0;
      state.modalStartTranslateY = 0;
      state.modalPinching = false;
      state.modalPinchStartDistance = 0;
      state.modalPinchStartScale = 1;
      els.modalImg.classList.remove("is-zoomed");
      els.modalImg.style.transform = "";
      els.modalImg.style.opacity = "";
    }

    function getTouchDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function applyModalTransform() {
      if (state.modalScale <= 1.01) {
        els.modalImg.classList.remove("is-zoomed");
        els.modalImg.style.transform = "";
        return;
      }

      els.modalImg.classList.add("is-zoomed");
      els.modalImg.style.transform =
        `translate3d(${state.modalTranslateX}px, ${state.modalTranslateY}px, 0) scale(${state.modalScale})`;
    }

    function applyModalZoom(scale) {
      state.modalScale = Math.min(Math.max(scale, 1), 3.2);

      if (state.modalScale <= 1.01) {
        state.modalScale = 1;
        state.modalTranslateX = 0;
        state.modalTranslateY = 0;
      }

      applyModalTransform();
    }

    function handleModalTouchStart(event) {
      if (!els.modal.classList.contains("open")) return;

      if (event.touches.length === 2) {
        event.preventDefault();
        state.modalPinching = true;
        state.modalPointerActive = false;
        state.modalPinchStartDistance = getTouchDistance(event.touches);
        state.modalPinchStartScale = state.modalScale || 1;
        els.modal.classList.remove("hint");
        els.modalImg.classList.remove("swiping");
        return;
      }

      if (event.touches.length === 1 && state.modalScale > 1.01) {
        event.preventDefault();
        state.modalPanStartX = event.touches[0].clientX;
        state.modalPanStartY = event.touches[0].clientY;
        state.modalStartTranslateX = state.modalTranslateX;
        state.modalStartTranslateY = state.modalTranslateY;
      }
    }

    function handleModalTouchMove(event) {
      if (!els.modal.classList.contains("open")) return;

      if (state.modalPinching && event.touches.length === 2) {
        event.preventDefault();
        event.stopPropagation();
        const currentDistance = getTouchDistance(event.touches);
        if (!state.modalPinchStartDistance) return;

        const nextScale = state.modalPinchStartScale * (currentDistance / state.modalPinchStartDistance);
        applyModalZoom(nextScale);
        return;
      }

      if (event.touches.length === 1 && state.modalScale > 1.01) {
        event.preventDefault();
        event.stopPropagation();

        const dx = event.touches[0].clientX - state.modalPanStartX;
        const dy = event.touches[0].clientY - state.modalPanStartY;
        const maxX = Math.min(window.innerWidth * .34, 180) * (state.modalScale - 1);
        const maxY = Math.min(window.innerHeight * .34, 220) * (state.modalScale - 1);

        state.modalTranslateX = Math.max(Math.min(state.modalStartTranslateX + dx, maxX), -maxX);
        state.modalTranslateY = Math.max(Math.min(state.modalStartTranslateY + dy, maxY), -maxY);
        applyModalTransform();
      }
    }

    function handleModalTouchEnd(event) {
      if (state.modalPinching && event.touches.length < 2) {
        state.modalPinching = false;
        if (state.modalScale < 1.04) {
          applyModalZoom(1);
        }
      }
    }



    function lockPageScroll() {
      state.lockedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.style.top = `-${state.lockedScrollY}px`;
      document.body.classList.add("modal-open");
    }

    function unlockPageScroll() {
      document.body.classList.remove("modal-open");
      document.body.style.top = "";
      window.scrollTo(0, state.lockedScrollY || 0);
    }

    function updateModalImage() {
      const photo = photos[state.index];
      resetModalZoom();
      els.modalImg.src = photo.file;
      els.modalImg.alt = photo.title;
      els.modalImg.classList.add("zoomable");
    }

    function showModalSwipeHint() {
      clearTimeout(state.modalHintTimer);
      els.modal.classList.remove("hint");
      void els.modal.offsetWidth;
      els.modal.classList.add("hint");

      state.modalHintTimer = setTimeout(() => {
        els.modal.classList.remove("hint");
      }, 1800);
    }

    function openModal() {
      if (state.slideshow) toggleSlideshow();
      updateModalImage();
      lockPageScroll();
      els.modal.classList.add("open");
      showModalSwipeHint();
    }

    function moveModal(step) {
      state.slideDirection = step >= 0 ? 1 : -1;
      move(step);
      updateModalImage();
    }

    function closeModal() {
      clearTimeout(state.modalHintTimer);
      resetModalZoom();
      els.modal.classList.remove("open", "hint");
      unlockPageScroll();
    }

    function renderGrid() {
      const list = filteredPhotos();
      els.gridList.innerHTML = "";

      list.forEach((photo) => {
        const liked = state.favorites.includes(photo.file);
        const tile = document.createElement("button");
        tile.className = `grid-tile ${photo.originalIndex === state.index ? "active" : ""}`;
        tile.type = "button";
        tile.innerHTML = `
          <img src="${photo.thumb}" alt="${photo.title}" loading="lazy" decoding="async" onerror="this.onerror=null; this.src='${photo.file}';">
          <span>${liked ? "♥ " : ""}${photo.title}</span>
        `;
        tile.addEventListener("click", () => {
          state.slideDirection = photo.originalIndex >= state.index ? 1 : -1;
          closeGrid();
          selectPhoto(photo.originalIndex);
        });
        els.gridList.appendChild(tile);
      });
    }

    function openGrid() {
      if (state.slideshow) toggleSlideshow();
      renderGrid();
      els.gridModal.classList.add("open");
      requestAnimationFrame(() => {
        const activeTile = els.gridList.querySelector(".grid-tile.active");
        if (activeTile) {
          activeTile.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
        }
      });
    }

    function closeGrid() {
      els.gridModal.classList.remove("open");
    }

    function jumpByProgress(event) {
      const list = filteredPhotos();
      if (!list.length) return;

      const rect = els.progressWrap.getBoundingClientRect();
      const ratio = Math.min(Math.max((event.clientX - rect.left) / rect.width, 0), 1);
      const visibleIndex = Math.min(Math.floor(ratio * list.length), list.length - 1);
      const target = list[visibleIndex];

      if (!target) return;
      state.slideDirection = target.originalIndex >= state.index ? 1 : -1;
      selectPhoto(target.originalIndex);
    }

    function startLongPress() {
      if (state.slideshow) return;
      state.longPressTriggered = false;
      clearTimeout(state.longPressTimer);
      state.longPressTimer = setTimeout(() => {
        state.longPressTriggered = true;
        downloadCurrentPhoto();
      }, 720);
    }

    function cancelLongPress() {
      clearTimeout(state.longPressTimer);
    }


    function preloadImage(index) {
      const safeIndex = (index + photos.length) % photos.length;
      const photo = photos[safeIndex];
      if (!photo || state.imageCache.has(photo.file)) return;

      const img = new Image();
      img.decoding = "async";
      img.src = photo.file;
      state.imageCache.set(photo.file, img);
    }

    function preloadThumb(index) {
      const safeIndex = (index + photos.length) % photos.length;
      const photo = photos[safeIndex];
      if (!photo || state.thumbCache.has(photo.thumb)) return;

      const img = new Image();
      img.decoding = "async";
      img.src = photo.thumb;
      state.thumbCache.set(photo.thumb, img);
    }

    function preloadAround(index) {
      preloadImage(index);
      preloadImage(index + 1);
      preloadImage(index + 2);
      preloadImage(index - 1);
      preloadThumb(index);
      preloadThumb(index + 1);
      preloadThumb(index + 2);
      preloadThumb(index - 1);
    }

    function preloadInitialImages() {
      [0, 1, 2, 3, 4].forEach((index) => {
        preloadImage(index);
        preloadThumb(index);
      });
    }

    function handlePointerDown(event) {
      if (event.button !== undefined && event.button !== 0) return;

      state.pointerActive = true;
      state.activePointerId = event.pointerId;
      state.gestureStartX = event.clientX;
      state.gestureStartY = event.clientY;
      state.gestureStartTime = Date.now();

      try {
        els.frame.setPointerCapture(event.pointerId);
      } catch (error) {}
    }

    function handlePointerMove(event) {
      if (!state.pointerActive || event.pointerId !== state.activePointerId) return;
    }

    function handlePointerUp(event) {
      if (!state.pointerActive || event.pointerId !== state.activePointerId) return;

      const diffX = event.clientX - state.gestureStartX;
      const diffY = event.clientY - state.gestureStartY;
      const elapsed = Date.now() - state.gestureStartTime;

      state.pointerActive = false;
      state.activePointerId = null;

      const isHorizontalSwipe = Math.abs(diffX) > 34 && Math.abs(diffX) > Math.abs(diffY) * 1.15;
      if (isHorizontalSwipe) {
        move(diffX < 0 ? 1 : -1);
        return;
      }

      const isTap = Math.abs(diffX) < 12 && Math.abs(diffY) < 12 && elapsed < 520;
      if (isTap) {
        if (state.slideshow) {
          toggleSlideshow();
        } else {
          openModal();
        }
      }
    }

    function handlePointerCancel() {
      state.pointerActive = false;
      state.activePointerId = null;
    }



    function preventModalScrollLeak(event) {
      if (els.modal.classList.contains("open")) {
        event.preventDefault();
      }
    }

    function handleModalPointerDown(event) {
      if (!els.modal.classList.contains("open")) return;
      if (state.modalPinching || state.modalScale > 1.01) return;
      if (event.button !== undefined && event.button !== 0) return;

      state.modalPointerActive = true;
      state.modalStartX = event.clientX;
      state.modalStartY = event.clientY;
      state.modalCurrentX = event.clientX;
      state.modalCurrentY = event.clientY;
      state.modalLastX = event.clientX;
      state.modalStartTime = Date.now();
      state.modalLastTime = state.modalStartTime;
      state.modalVelocityX = 0;

      els.modal.classList.remove("hint");
      els.modalImg.classList.add("swiping");

      try {
        els.modal.setPointerCapture(event.pointerId);
      } catch (error) {}
    }

    function handleModalPointerMove(event) {
      if (els.modal.classList.contains("open")) {
        event.preventDefault();
      }
      if (state.modalPinching || state.modalScale > 1.01) return;
      if (!state.modalPointerActive) return;

      const now = Date.now();
      const diffX = event.clientX - state.modalStartX;
      const diffY = event.clientY - state.modalStartY;
      const dt = Math.max(now - state.modalLastTime, 1);

      state.modalVelocityX = (event.clientX - state.modalLastX) / dt;
      state.modalCurrentX = event.clientX;
      state.modalCurrentY = event.clientY;
      state.modalLastX = event.clientX;
      state.modalLastTime = now;

      const mostlyHorizontal = Math.abs(diffX) > Math.abs(diffY) * .75;

      if (mostlyHorizontal) {
        event.preventDefault();
        const limitedX = Math.max(Math.min(diffX, 90), -90);
        const opacity = Math.max(1 - Math.abs(limitedX) / 320, .72);
        els.modalImg.style.transform = `translateX(${limitedX}px) scale(.995)`;
        els.modalImg.style.opacity = String(opacity);
      }
    }

    function resetModalDragStyle() {
      els.modalImg.classList.remove("swiping");
      if (state.modalScale > 1.01) {
        applyModalTransform();
      } else {
        els.modalImg.style.transform = "";
      }
      els.modalImg.style.opacity = "";
    }

    function animateModalSlide(direction) {
      els.modalImg.classList.remove("modal-slide-in");
      els.modalImg.style.setProperty("--modal-slide-from", `${direction * 22}px`);
      void els.modalImg.offsetWidth;
      els.modalImg.classList.add("modal-slide-in");
    }

    function handleModalPointerUp(event) {
      if (state.modalPinching || state.modalScale > 1.01) {
        state.modalPointerActive = false;
        return;
      }
      if (!state.modalPointerActive) return;

      const diffX = event.clientX - state.modalStartX;
      const diffY = event.clientY - state.modalStartY;
      const elapsed = Math.max(Date.now() - state.modalStartTime, 1);
      const averageVelocityX = diffX / elapsed;
      const velocityX = Math.abs(state.modalVelocityX) > Math.abs(averageVelocityX)
        ? state.modalVelocityX
        : averageVelocityX;

      state.modalPointerActive = false;
      resetModalDragStyle();

      const distancePass = Math.abs(diffX) > 34 && Math.abs(diffX) > Math.abs(diffY) * .9;
      const velocityPass = Math.abs(velocityX) > .32 && Math.abs(diffX) > 18;
      const isHorizontalSwipe = distancePass || velocityPass;

      if (isHorizontalSwipe) {
        const step = diffX < 0 ? 1 : -1;
        moveModal(step);
        animateModalSlide(step >= 0 ? 1 : -1);
        return;
      }

      const isTapOnBackdrop = event.target === els.modal && Math.abs(diffX) < 10 && Math.abs(diffY) < 10 && elapsed < 450;
      if (isTapOnBackdrop) {
        closeModal();
      }
    }

    function handleModalPointerCancel() {
      state.modalPointerActive = false;
      resetModalDragStyle();
    }

    function isPageAtTop() {
      return window.scrollY <= 0 && document.documentElement.scrollTop <= 0;
    }

    function showPullRefresh(distance) {
      const threshold = 92;
      const progress = Math.min(distance / threshold, 1);
      els.pullRefresh.classList.add("show");
      els.pullRefresh.classList.toggle("ready", distance >= threshold);
      els.pullRefresh.style.opacity = String(Math.min(progress + .15, 1));
      els.pullRefresh.style.transform = `translateX(-50%) translateY(${Math.min(distance * .42, 42) - 26}px) scale(${.96 + progress * .04})`;
    }

    function resetPullRefresh() {
      els.pullRefresh.classList.remove("show", "ready", "loading");
      els.pullRefresh.style.opacity = "";
      els.pullRefresh.style.transform = "";
      state.pullActive = false;
      state.pullDistance = 0;
    }

    function enablePullToRefresh() {
      window.addEventListener("touchstart", (event) => {
        if (!event.touches || event.touches.length !== 1) return;
        if (!isPageAtTop()) return;

        state.pullStartY = event.touches[0].clientY;
        state.pullActive = true;
        state.pullDistance = 0;
      }, { passive: true });

      window.addEventListener("touchmove", (event) => {
        if (!state.pullActive || !event.touches || event.touches.length !== 1) return;

        const distance = event.touches[0].clientY - state.pullStartY;
        if (distance > 0 && isPageAtTop()) {
          state.pullDistance = Math.min(distance, 140);
          showPullRefresh(state.pullDistance);
          if (distance > 18) event.preventDefault();
        }
      }, { passive: false });

      window.addEventListener("touchend", () => {
        if (!state.pullActive) return;

        if (state.pullDistance >= 92) {
          els.pullRefresh.classList.remove("ready");
          els.pullRefresh.classList.add("show", "loading");
          els.pullRefresh.style.opacity = "1";
          els.pullRefresh.style.transform = "translateX(-50%) translateY(18px) scale(1)";
          setTimeout(() => window.location.reload(), 420);
        } else {
          resetPullRefresh();
        }
      }, { passive: true });
    }






    els.favoriteBtn.addEventListener("click", toggleFavorite);
    els.filterBtn.addEventListener("click", toggleFilterFavorites);
    els.gridBtn.addEventListener("click", openGrid);
    els.musicBtn.addEventListener("click", toggleMusic);
    els.downloadBtn.addEventListener("click", downloadCurrentPhoto);
    els.bwBtn.addEventListener("click", toggleBwMode);
    els.shareBtn.addEventListener("click", sharePage);
    els.homeBtn.addEventListener("click", addToHomeScreen);
    els.slideshowBtn.addEventListener("click", toggleSlideshow);
    els.prevBtn.addEventListener("click", () => move(-1));
    els.nextBtn.addEventListener("click", () => move(1));
    els.fullBtn.addEventListener("click", openModal);
    els.frame.addEventListener("pointerdown", handlePointerDown);
    els.frame.addEventListener("pointermove", handlePointerMove);
    els.frame.addEventListener("pointerup", handlePointerUp);
    els.frame.addEventListener("pointercancel", handlePointerCancel);

    els.modal.addEventListener("pointerdown", handleModalPointerDown);
    els.modal.addEventListener("pointermove", handleModalPointerMove);
    els.modal.addEventListener("pointerup", handleModalPointerUp);
    els.modal.addEventListener("pointercancel", handleModalPointerCancel);
    els.modal.addEventListener("lostpointercapture", handleModalPointerCancel);
    els.modal.addEventListener("touchstart", handleModalTouchStart, { passive: false });
    els.modal.addEventListener("touchmove", handleModalTouchMove, { passive: false });
    els.modal.addEventListener("touchend", handleModalTouchEnd, { passive: false });
    els.modal.addEventListener("touchmove", preventModalScrollLeak, { passive: false });
    els.modal.addEventListener("wheel", preventModalScrollLeak, { passive: false });
    els.gridCloseBtn.addEventListener("click", closeGrid);
    els.gridModal.addEventListener("click", (event) => {
      if (event.target === els.gridModal) closeGrid();
    });
    els.installCloseBtn.addEventListener("click", closeInstallGuide);
    els.installModal.addEventListener("click", (event) => {
      if (event.target === els.installModal) closeInstallGuide();
    });
    els.progressWrap.addEventListener("click", jumpByProgress);
    els.mainImg.addEventListener("pointerdown", startLongPress);
    els.mainImg.addEventListener("pointerup", cancelLongPress);
    els.mainImg.addEventListener("pointercancel", cancelLongPress);
    els.mainImg.addEventListener("pointerleave", cancelLongPress);
    els.mainImg.addEventListener("contextmenu", (event) => {
      if (state.longPressTriggered) event.preventDefault();
    });
    els.mainImg.addEventListener("animationend", () => {
      els.mainImg.classList.remove("slide-in");
      if (!document.body.classList.contains("immersive")) {
        clearPhotoEffects();
      }
    });
    els.modalImg.addEventListener("animationend", () => {
      els.modalImg.classList.remove("modal-slide-in");
    });



    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") move(-1);
      if (event.key === "ArrowRight") move(1);
      if (event.key === "Escape") {
        closeModal();
        closeGrid();
        closeInstallGuide();
        if (state.slideshow) toggleSlideshow();
        else exitImmersiveMode();
      }
      if (event.key.toLowerCase() === "f") toggleFavorite();
      if (event.key === " ") {
        event.preventDefault();
        toggleSlideshow();
      }
    });

    hideIntro();
    setupPwaManifest();
    setupInstallPrompt();
    applyBwMode();
    enableFirstTouchMusic();
    enablePullToRefresh();
    preloadInitialImages();
    renderDateCounts();
    updateFilterButton();
    setInterval(renderDateCounts, 1000);
    renderList();
    renderDots();
    selectPhoto(state.index);
    requestAnimationFrame(() => document.body.classList.add("intro-ready"));
  </script>
</body>
</html>
